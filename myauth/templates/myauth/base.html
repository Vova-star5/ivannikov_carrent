{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href='{% static "style.css" %}'>
    <title>
        {% block title %}title{% endblock %}
        
    </title>
</head>
<body>
    <div class="container">
        <header class="header">
            <nav class="nav">
                <a href="{% url "index" %}">
                <img class="logo" src="{% static "img/logo.jpg" %}" alt="">
                </a>
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="{% url "index" %}">Главная
                            </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url "car_list" %}">Каталог машин
                            </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url "about" %}">О нас
                            </a>
                        </li>


                    <li class="nav-item">
                        <a href="{% url "contacts" %}">Контакты
                            </a>
                    </li>

                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a href="{% url "myauth:profile" %}">Профиль
                            </a>
                    </li>
                    {% else %}
                    <li class="nav-item">
                        <a href="{% url "myauth:login" %}">Войти
                            </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url "myauth:registration" %}">Зарегистрироваться
                            </a>
                    </li>
                    {% endif %}
                </ul>
            </nav>
        </header>
        <main class="main">
            {% block main %}
            {% endblock %}


        </main>
        <footer class="footer">
            © Иванников 2026

        </footer>
    </div>
</body>
</html>
